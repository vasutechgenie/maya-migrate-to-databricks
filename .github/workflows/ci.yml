name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest
      - name: Smoke - run the Northwind demo end to end
        run: make demo
      - name: Scrub check (no customer references)
        run: |
          # scan the repo but not generated outputs or this workflow file itself
          if grep -RInE "vizient|hrzn|\bhorizon\b" \
              --exclude-dir=.git --exclude-dir=out --exclude-dir=workflows . ; then
            echo "::error::found customer references in the repo"; exit 1
          fi
