# Northwind - the runnable MAYA demo (a fictional retailer migrating Synapse -> Databricks).
# Run every phase from the repo root:
#   python3 cli.py graph   --config examples/northwind/northwind.yaml
#   python3 cli.py order   --config examples/northwind/northwind.yaml
#   python3 cli.py verify  --config examples/northwind/northwind.yaml
#   python3 cli.py context --config examples/northwind/northwind.yaml
#   python3 cli.py maya sample --config examples/northwind/northwind.yaml --pipeline nw_build_sales
#   python3 cli.py validate --config examples/northwind/northwind.yaml --pipeline nw_build_marts --env soak
#   python3 cli.py report  --config examples/northwind/northwind.yaml
# or simply: make demo
project_name: northwind

adapter: adapters.synapse.adapter.SynapseAdapter

# paths resolve against THIS file's directory (examples/northwind/); out/ is generated.
graph_dir: out                 # objects.csv / edges.csv copied here by the adapter
out_dir: out                   # derived CSV/PDF land here
specs_dir: out/pipeline_specs

pipeline_types: [PIPELINE, SYNAPSE_PIPELINE]
table_types: [TABLE, CONFIG_TABLE]

home_database: northwind        # tables in other DBs (ext_erp, ext_web, ext_fin) are external
table_max_tb: 2.0

# schema -> medallion layer
schema_layers:
  src: bronze
  sales: silver
  rdm: gold
  serving: serving
  metadata: config

branding:
  org: MAYA
  dark: "#1F2430"
  accent: "#3B4CCA"
  show_databricks_lockup: true

maya:
  sample_rows: 10000
  sample_overrides:
    src.orders: 20000
    src.order_lines: 40000
  sampling: ri_preserving
  seed: 42
  dev_catalog: nw_dev
  sit_catalog: nw_sit
  source_ref_catalog: nw_ref
  require_both_phases: true
  require_soak: true
  soak_windows_days: [7, 14]
  soak_drift_tolerance: 0.0
  # Stage 2 - whole-estate replication into a Databricks test catalog.
  test_catalog: nw_test
  synthetic_rows: 10000
  test_from_source: false        # demo generates synthetic RI data (runs offline)

# The AI coding-agent swarm that builds/validates/fixes in Stages 4-5.
# The demo uses the deterministic offline backend so it runs with zero external calls;
# set driver: cursor (+ CURSOR_API_KEY) to drive real LLM agents via the Cursor SDK.
agents:
  driver: offline                # offline | cursor
  model: composer-2.5
  concurrency: 6
  max_fix_iters: 5
  publish_remote: false          # Stage 6: local commit only for the demo (no push)
  publish_branch: main

# Stage 0 + 7 - identity, access, secrets, classification, governance.
# The source estate (principals, grants, secrets, classification) is exported by the
# adapter from examples/northwind/artifacts/security/*; these settings drive how it is
# translated into Unity Catalog at cutover.
security:
  target_catalog: nw_sit          # UC catalog the grants/masks are authored against
  secret_scope: nw_secrets        # Databricks secret scope for migrated credentials
  row_filters:                    # row-level security policies to apply
    - table: sales.dim_customer
      column: region
      group: nw_analysts

governance:
  owners:                         # schema -> owning group
    src: nw_engineers
    sales: nw_engineers
    rdm: nw_stewards
    serving: nw_stewards
    metadata: nw_ops
  tags:                           # schema -> medallion tag
    src: bronze
    sales: silver
    rdm: gold
    serving: serving
  glossary:
    Customer 360: Unified per-customer view across sales and web behavior
    Gold mart: Curated, business-ready aggregate table

# Stage 8 - enablement + day-2 operations. (audiences omitted -> sensible defaults:
# engineer / analyst / steward / ops.)
enablement: {}

ops:
  monitors: [job_success_rate, pipeline_latency, maya_parity_drift, freshness_sla,
             row_count_delta]
  alerts:
    - {name: job_failure, channel: pagerduty, severity: sev1}
    - {name: parity_drift, channel: slack, severity: sev2}
    - {name: freshness_breach, channel: slack, severity: sev2}
  cost_budget: {monthly_usd: 5000, alert_at_pct: 80}
  dr: {rpo_hours: 24, rto_hours: 4, backup: "Delta deep clone to a secondary region, daily"}

adapter_options:
  # source_dir/artifacts_dir resolve from the current working directory (run from repo root)
  source_dir: examples/northwind
  artifacts_dir: examples/northwind/artifacts
  bi:
    system: powerbi
    workspace: "Northwind BI"
    package_dir: examples/northwind/bi_export
    table_map:
      dbo.FactSales: rdm.mart_sales_daily
      dbo.DimProduct: sales.dim_product
    genie:
      enabled: true
      catalog: nw_sit
      one_space_per_dashboard: true
    lakeview:
      enabled: true
